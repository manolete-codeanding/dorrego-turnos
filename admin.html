<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Dorrego 1869</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      background-image: radial-gradient(ellipse 80% 60% at 50% 0%, #1e1b4b 0%, #0f172a 70%);
      padding: 2rem;
    }
    .login-card {
      background: var(--card);
      border-radius: 20px;
      padding: 2.25rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    }
    .login-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .login-card h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: -0.25px; }
    .login-card > p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .login-card .form-group { text-align: left; }

    /* ── LAYOUT ── */
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 0;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .admin-header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.25px; }
    .admin-header span { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 1px; }

    /* ── TABS ── */
    .admin-tabs {
      display: flex;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .a-tab-btn {
      padding: 0.75rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
      font-family: inherit;
    }
    .a-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .count-badge {
      background: var(--border);
      color: var(--muted);
      border-radius: 99px;
      padding: 0.1rem 0.5rem;
      font-size: 0.68rem;
      font-weight: 700;
      transition: all 0.15s;
    }
    .a-tab-btn.active .count-badge { background: #e0e7ff; color: var(--accent); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-header h2 { font-size: 0.9375rem; font-weight: 700; letter-spacing: -0.1px; }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: var(--bg);
      padding: 0.7rem 1rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border-soft); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 0.75rem 1rem; vertical-align: middle; }
    td.col-actions { white-space: nowrap; }
    td.col-actions .btn + .btn { margin-left: 0.35rem; }
    td.col-muted { color: var(--muted); font-size: 0.8rem; }
    .col-mono { font-family: ui-monospace, 'SF Mono', monospace; font-size: 0.83rem; }

    /* ── PILLS ── */
    .unit-pill {
      background: var(--accent);
      color: #fff;
      border-radius: 7px;
      padding: 0.2rem 0.55rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .type-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.22rem 0.55rem;
      border-radius: 7px;
    }
    .type-pill.lavado { background: #dbeafe; color: #1d4ed8; }
    .type-pill.secado { background: #fef3c7; color: #b45309; }

    /* ── BUTTON EXTRAS ── */
    .btn-xs { padding: 0.3rem 0.65rem; font-size: 0.75rem; border-radius: 7px; }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 3.5rem; color: var(--muted); font-size: 0.9rem; line-height: 1.6; }

    /* ── MODAL ── */
    .a-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 1rem;
    }
    .a-modal-overlay.open { display: flex; }
    .a-modal {
      background: var(--card);
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.25);
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeScaleIn 0.2s ease;
    }
    @keyframes fadeScaleIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .a-modal h2 { font-size: 1.125rem; font-weight: 700; margin-bottom: 1.25rem; letter-spacing: -0.25px; }
    .a-modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .a-modal-actions .btn { flex: 1; }

    /* ── DETAIL GRID ── */
    .detail-grid {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      background: var(--bg);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
    }
    .detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; }
    .detail-row .d-label { color: var(--muted); }
    .detail-row .d-value { font-weight: 600; }

    .muted-label { color: var(--muted); font-weight: 400; font-size: 0.78rem; }

    /* ── LOADING ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    /* ── TOAST ── */
    #admin-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #0f172a;
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 400;
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    #admin-toast.show    { transform: translateX(-50%) translateY(0); }
    #admin-toast.success { background: #14532d; }
    #admin-toast.error   { background: #7f1d1d; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="admin-toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
