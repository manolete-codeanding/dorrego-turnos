<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Dorrego 1869</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--bg); }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      padding: 2rem;
    }
    .login-card {
      background: var(--card);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .login-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .login-card h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
    .login-card > p { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .login-card .form-group { text-align: left; }

    /* ── LAYOUT ── */
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem 3rem; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .admin-header h1 { font-size: 1.15rem; font-weight: 700; }
    .admin-header span { font-size: 0.78rem; color: var(--muted); }

    /* ── TABS ── */
    .admin-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .a-tab-btn {
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -2px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.15s;
    }
    .a-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .count-badge {
      background: var(--border);
      color: var(--muted);
      border-radius: 99px;
      padding: 0.1rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .a-tab-btn.active .count-badge { background: #eff6ff; color: var(--accent); }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .section-header h2 { font-size: 1rem; font-weight: 700; }

    /* ── TABLE ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th {
      background: var(--bg);
      padding: 0.65rem 0.9rem;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9ff; }
    tbody td { padding: 0.7rem 0.9rem; vertical-align: middle; }
    td.col-actions { white-space: nowrap; }
    td.col-actions .btn + .btn { margin-left: 0.35rem; }
    td.col-muted { color: var(--muted); font-size: 0.8rem; }
    .col-mono { font-family: ui-monospace, monospace; font-size: 0.83rem; }

    /* ── PILLS ── */
    .unit-pill {
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      padding: 0.2rem 0.5rem;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .type-pill {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }
    .type-pill.lavado { background: #dbeafe; color: #1d4ed8; }
    .type-pill.secado { background: #fef3c7; color: #b45309; }

    /* ── BUTTON EXTRAS ── */
    .btn-xs { padding: 0.28rem 0.6rem; font-size: 0.75rem; border-radius: 6px; }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

    /* ── MODAL ── */
    .a-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      padding: 1rem;
    }
    .a-modal-overlay.open { display: flex; }
    .a-modal {
      background: var(--card);
      border-radius: 16px;
      padding: 1.75rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
      max-height: 90vh;
      overflow-y: auto;
    }
    .a-modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .a-modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
    .a-modal-actions .btn { flex: 1; }

    /* ── DETAIL GRID ── */
    .detail-grid {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      background: var(--bg);
      border-radius: 10px;
      padding: 0.9rem;
      margin-bottom: 1rem;
    }
    .detail-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; }
    .detail-row .d-label { color: var(--muted); }
    .detail-row .d-value { font-weight: 600; }

    .muted-label { color: var(--muted); font-weight: 400; font-size: 0.8rem; }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.65);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    /* ── TOAST ── */
    #admin-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #1e293b;
      color: #fff;
      padding: 0.7rem 1.25rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 400;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      pointer-events: none;
    }
    #admin-toast.show { transform: translateX(-50%) translateY(0); }
    #admin-toast.success { background: #166534; }
    #admin-toast.error   { background: #991b1b; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="admin-toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
